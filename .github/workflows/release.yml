name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to build and publish, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  build-and-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --config src-tauri/tauri.windows.conf.json
          - os: ubuntu-22.04
            args: --config src-tauri/tauri.linux.conf.json
          - os: macos-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundles and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: D.W.I.F. ${{ env.RELEASE_TAG }}
          releaseBody: |
            Prebuilt desktop bundles for D.W.I.F.

            Windows users can download the installer or portable bundle here instead of cloning the repo.
            Linux users can download the AppImage or distribution package from this release.
            macOS users can download the application bundle or disk image from this release.
          releaseDraft: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          tauriScript: node scripts/run-tauri.mjs
          args: ${{ matrix.args }}
